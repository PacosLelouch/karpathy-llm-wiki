# LLM Wiki Agent 元数据定义
# 各 agent 的指令内容在 instructions/ 目录下的同名 .md 文件中

agents:
  llm-wiki-linter:
    name: llm-wiki-linter
    description: 语义巡检分析——遍历 wiki 页面交叉验证一致性，输出 YAML 结构化巡检报告（auto_fixed/needs_review/suggestions）
    trigger: "深度巡检|检查矛盾|检查过期|概念缺口|重复页分析|知识库健康检查"
  llm-wiki-ingest-compiler:
    name: llm-wiki-ingest-compiler
    description: 摄入编译器——处理复杂摄入：raw → wiki 多页面编译 → cascade 更新规划，输出 YAML 结构化编译方案（create_pages/update_pages/cascade）
    trigger: "复杂摄入|多页面编译|跨领域摄入|cascade更新规划"
